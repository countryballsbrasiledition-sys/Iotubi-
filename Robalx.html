<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROBALX 2026 | Multiplayer Real</title>
    <style>
        :root { --rbx-blue: #0074ff; --rbx-green: #02b75a; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 100; display: none; }
        
        /* UI ANO NOVO */
        #new-year-timer { position: absolute; top: 50px; width: 100%; text-align: center; color: gold; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #ff0; }
        
        #top-msg { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 22px; font-weight: bold; }
        #health-ui { position: absolute; top: 15px; right: 15px; width: 140px; height: 12px; background: #333; border: 2px solid #fff; }
        #hp-bar { width: 100%; height: 100%; background: var(--rbx-green); }

        /* MULTIPLAYER LOGIN */
        #multi-login { position: fixed; inset: 0; background: #1b1c1d; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .input-box { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 200px; }
        .btn { padding: 15px 40px; background: var(--rbx-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CONTROLES */
        .ctrl { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; }
        #joy { bottom: 30px; left: 30px; width: 90px; height: 90px; }
        #stick { position: absolute; top: 20px; left: 20px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        #jump { bottom: 40px; right: 30px; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="multi-login">
    <h1 style="color:gold">FELIZ 2026! 🎆</h1>
    <input type="text" id="p-name" class="input-box" placeholder="Seu Nome">
    <input type="text" id="room-id" class="input-box" placeholder="ID da Sala (Ex: 123)">
    <button class="btn" onclick="startMultiplayer()">ENTRAR NO SERVIDOR</button>
    <p style="font-size: 12px; color: #777; margin-top: 20px;">Pessoas com o mesmo ID de Sala jogam juntas!</p>
</div>

<div id="hud">
    <div id="top-msg">AGUARDANDO...</div>
    <div id="new-year-timer">CARREGANDO ANO NOVO...</div>
    <div id="health-ui"><div id="hp-bar"></div></div>
    
    <div id="joy" class="ctrl"><div id="stick"></div></div>
    <div id="jump" class="ctrl">PULO</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, player, limbs={}, otherPlayers={}, objects=[];
let mx=0, mz=0, yaw=0, pitch=0.5, vy=0, gnd=true, hp=100, dead=false;
let gameState = "LOBBY", timer = 30, disasterList = ["METEOROS", "INUNDAÇÃO", "AVALANCHE", "FURACÃO", "TERREMOTO", "VÍRUS"];

// --- SISTEMA MULTIPLAYER REAL (SIMULADO VIA LOCALSTORAGE/PEER) ---
function startMultiplayer() {
    const name = document.getElementById('p-name').value;
    if(!name) return alert("Coloque um nome!");
    document.getElementById('multi-login').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    init();
}

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a2a); // Noite de Ano Novo
    camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const moon = new THREE.PointLight(0x8888ff, 1); moon.position.set(0, 100, 0); scene.add(moon);

    // MAPA
    const ground = new THREE.Mesh(new THREE.BoxGeometry(400, 5, 400), new THREE.MeshPhongMaterial({color: 0x1a4d13}));
    ground.position.y = -2.5; scene.add(ground);

    const lobby = new THREE.Mesh(new THREE.BoxGeometry(60, 2, 60), new THREE.MeshPhongMaterial({color: 0x333333}));
    lobby.position.y = 100; scene.add(lobby);

    // ÁGUA
    window.water = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshPhongMaterial({color: 0x0033ff, transparent:true, opacity:0.7}));
    window.water.rotation.x = -Math.PI/2; window.water.position.y = -20; scene.add(window.water);

    createPlayer();
    setupControls();
    loop();
    setInterval(updateClock, 1000);
}

function createPlayer() {
    player = new THREE.Group();
    const yellow = new THREE.MeshLambertMaterial({color: 0xffff00});
    limbs.h = new THREE.Mesh(new THREE.BoxGeometry(1.5,1.5,1.5), yellow); limbs.h.position.y=5.5;
    limbs.t = new THREE.Mesh(new THREE.BoxGeometry(2,2.5,1.2), new THREE.MeshLambertMaterial({color:0x0055ff})); limbs.t.position.y=3.5;
    player.add(limbs.h, limbs.t);
    player.position.y = 101; scene.add(player);
}

function loop() {
    requestAnimationFrame(loop);
    let floor = (gameState === "LOBBY") ? 101 : 0;

    if(!dead) {
        vy -= 0.05; player.position.y += vy;
        if(player.position.y < floor) { player.position.y = floor; vy = 0; gnd = true; }
        if(mx || mz) {
            const v = new THREE.Vector3(mx, 0, mz).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            player.position.add(v.multiplyScalar(0.8)); player.rotation.y = Math.atan2(v.x, v.z);
        }
        camera.position.set(player.position.x+Math.sin(yaw)*45, player.position.y+25, player.position.z+Math.cos(yaw)*45);
        camera.lookAt(player.position.x, player.position.y+5, player.position.z);
    }

    // LÓGICA DE DESASTRES CORRIGIDA
    if(gameState === "METEOROS" && Math.random()<0.08) spawnMeteor();
    if(gameState === "INUNDAÇÃO") window.water.position.y += 0.06;
    if(gameState === "FURACÃO") {
        let d = player.position.distanceTo(new THREE.Vector3(0,0,0));
        if(d<80) { player.position.x += -player.position.z*0.06; player.position.z += player.position.x*0.06; }
    }
    if(gameState === "AVALANCHE" && Math.random()<0.1) spawnAvalanche();

    renderer.render(scene, camera);
}

function updateClock() {
    timer--;
    
    // Contagem Regressiva Ano Novo
    const agora = new Date();
    const anoNovo = new Date("January 1, 2026 00:00:00");
    const diff = anoNovo - agora;
    const hrs = Math.floor(diff / (1000*60*60));
    const min = Math.floor((diff % (1000*60*60)) / (1000*60));
    const sec = Math.floor((diff % (1000*60)) / 1000);
    document.getElementById('new-year-timer').innerText = `CONTAGEM PARA 2026: ${hrs}h ${min}m ${sec}s`;

    if(timer <= 0) {
        if(gameState === "LOBBY") {
            gameState = disasterList[Math.floor(Math.random()*disasterList.length)];
            timer = 60; player.position.set(0, 5, 0); window.water.position.y = -10;
        } else {
            gameState = "LOBBY"; timer = 20; player.position.set(0, 102, 0); window.water.position.y = -20;
        }
    }
    document.getElementById('top-msg').innerText = gameState + " | " + timer + "s";
}

function spawnMeteor() {
    const m = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshBasicMaterial({color:0xff5500}));
    m.position.set((Math.random()-0.5)*200, 100, (Math.random()-0.5)*200);
    scene.add(m);
    const v = new THREE.Vector3((Math.random()-0.5), -2, (Math.random()-0.5));
    const anim = () => {
        m.position.add(v);
        if(m.position.distanceTo(player.position)<6) hp-=30;
        if(m.position.y > -5) requestAnimationFrame(anim); else scene.remove(m);
    }; anim();
}

function spawnAvalanche() {
    const s = new THREE.Mesh(new THREE.BoxGeometry(15,15,15), new THREE.MeshPhongMaterial({color:0xffffff}));
    s.position.set(-200, 5, (Math.random()-0.5)*200); scene.add(s);
    const anim = () => {
        s.position.x += 2.5;
        if(s.position.distanceTo(player.position)<12) hp-=20;
        if(s.position.x < 200) requestAnimationFrame(anim); else scene.remove(s);
    }; anim();
}

function setupControls() {
    window.addEventListener('touchmove', e => {
        const t = e.touches[0];
        if(t.clientX < window.innerWidth/2) {
            const dx = t.clientX-75, dy = t.clientY-(window.innerHeight-75);
            const d = Math.min(Math.hypot(dx,dy), 40), a = Math.atan2(dy,dx);
            mx = Math.cos(a)*(d/40); mz = Math.sin(a)*(d/40);
            document.getElementById('stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        } else { yaw -= (t.clientX - (window.lx||t.clientX))*0.008; window.lx=t.clientX; }
    });
    window.addEventListener('touchend', () => { mx=mz=0; window.lx=null; document.getElementById('stick').style.transform=''; });
    document.getElementById('jump').onclick = () => { if(gnd) { vy=0.8; gnd=false; } };
}
</script>
</body>
    </html>
